name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            preset: release
            artifact: libera-timecode-macos
            pr_artifact_paths: |
              build/Libera Timecode.app
            package_path: libera-timecode-macos.dmg
          - os: ubuntu-latest
            preset: linux-release
            artifact: libera-timecode-linux
            pr_artifact_paths: |
              build/libera_timecode
              build/libera_timecode_jitter
            package_path: libera-timecode-linux.AppImage
          - os: windows-latest
            preset: win-release
            artifact: libera-timecode-windows
            pr_artifact_paths: |
              build/Release/libera_timecode.exe
              build/Release/libera_timecode_jitter.exe
            package_path: libera-timecode-windows.zip

    runs-on: ${{ matrix.os }}
    env:
      MACOS_APP_BUNDLE: build/Libera Timecode.app
      MACOS_APP_EXECUTABLE: build/Libera Timecode.app/Contents/MacOS/Libera Timecode
      APPLE_SIGNING_AVAILABLE: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
      WINDOWS_SIGNING_AVAILABLE: ${{ vars.AZURE_TENANT_ID != '' && vars.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_SECRET != '' && vars.AZURE_SIGNING_ENDPOINT != '' && vars.AZURE_CODE_SIGNING_ACCOUNT_NAME != '' && vars.AZURE_CERT_PROFILE_NAME != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list ninja >/dev/null 2>&1 || brew install ninja

      - name: Install packaging dependencies (macOS)
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        run: |
          brew list create-dmg >/dev/null 2>&1 || brew install create-dmg

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            imagemagick \
            libasound2-dev \
            libdecor-0-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libpulse-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            ninja-build \
            pkg-config \
            wayland-protocols \
            wget \
            xorg-dev

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Import Apple certificate
        if: runner.os == 'macOS' && github.event_name != 'pull_request' && env.APPLE_SIGNING_AVAILABLE == 'true'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign app bundle
        if: runner.os == 'macOS' && github.event_name != 'pull_request' && env.APPLE_SIGNING_AVAILABLE == 'true'
        run: |
          codesign --deep --force --options runtime \
            --sign "Developer ID Application: Seb Lee-Delisle (${{ secrets.APPLE_TEAM_ID }})" \
            "$MACOS_APP_BUNDLE"

          codesign --verify --verbose "$MACOS_APP_BUNDLE"

      - name: Notarize app
        if: runner.os == 'macOS' && github.event_name != 'pull_request' && env.APPLE_SIGNING_AVAILABLE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "$MACOS_APP_BUNDLE" "$RUNNER_TEMP/libera-timecode-notarize.zip"

          xcrun notarytool submit "$RUNNER_TEMP/libera-timecode-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$MACOS_APP_BUNDLE"

      - name: Package DMG (macOS)
        if: runner.os == 'macOS' && github.event_name != 'pull_request'
        run: |
          create-dmg \
            --volname "Libera Timecode" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Libera Timecode.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "libera-timecode-macos.dmg" \
            "$MACOS_APP_BUNDLE" || true

          test -f libera-timecode-macos.dmg

      - name: Sign DMG (macOS)
        if: runner.os == 'macOS' && github.event_name != 'pull_request' && env.APPLE_SIGNING_AVAILABLE == 'true'
        run: |
          codesign --force --sign "Developer ID Application: Seb Lee-Delisle (${{ secrets.APPLE_TEAM_ID }})" \
            libera-timecode-macos.dmg

      - name: Sign executable (Windows)
        if: runner.os == 'Windows' && github.event_name != 'pull_request' && env.WINDOWS_SIGNING_AVAILABLE == 'true'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
          azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE_NAME }}
          cache-dependencies: false
          files-folder: build/Release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package AppImage (Linux)
        if: runner.os == 'Linux' && github.event_name != 'pull_request'
        run: |
          convert icons/libera-timecode.png -resize 512x512 libera-timecode.png

          sed 's/^          //' > libera-timecode.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Libera Timecode
          Comment=Timecode generator for SMPTE LTC, MIDI MTC, Art-Net, and SNTC
          Exec=libera_timecode
          Icon=libera-timecode
          Categories=AudioVideo;Audio;
          Terminal=false
          EOF

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1

          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --executable build/libera_timecode \
            --desktop-file libera-timecode.desktop \
            --icon-file libera-timecode.png

          export OUTPUT=libera-timecode-linux.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

      - name: Package (Windows)
        if: runner.os == 'Windows' && github.event_name != 'pull_request'
        shell: bash
        run: |
          mkdir -p staging/libera-timecode
          cp build/Release/libera_timecode.exe staging/libera-timecode/
          cp build/Release/libera_timecode_jitter.exe staging/libera-timecode/
          cd staging && 7z a ../libera-timecode-windows.zip libera-timecode

      - name: Upload PR build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-ci
          if-no-files-found: error
          path: ${{ matrix.pr_artifact_paths }}

      - name: Upload packaged artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: ${{ matrix.package_path }}

      - name: Cleanup keychain
        if: runner.os == 'macOS' && github.event_name != 'pull_request' && env.APPLE_SIGNING_AVAILABLE == 'true' && always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            libera-timecode-macos/libera-timecode-macos.dmg
            libera-timecode-linux/libera-timecode-linux.AppImage
            libera-timecode-windows/libera-timecode-windows.zip
          generate_release_notes: true
